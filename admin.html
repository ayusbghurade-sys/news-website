<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; margin:0; background:#f4f4f4; }

    .container { max-width: 500px; margin:auto; padding:20px; }

    input, textarea {
      width:100%;
      padding:10px;
      margin:8px 0;
    }

    button {
      padding:10px;
      width:100%;
      background:red;
      color:white;
      border:none;
      margin-top:5px;
    }

    .card {
      background:white;
      padding:10px;
      margin-top:10px;
      border-radius:6px;
    }

    img { width:100%; margin-top:5px; }

    .dashboard {
      background:black;
      color:white;
      padding:10px;
      text-align:center;
    }

    .hidden { display:none; }
  </style>
</head>
<body>

<div class="dashboard">
  <h3>Admin Dashboard</h3>
  <p>Total News: <span id="totalNews">0</span></p>
</div>

<div class="container">

  <!-- LOGIN SECTION -->
  <div id="loginSection">
    <h3>Admin Login</h3>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel" class="hidden">
    <h3>Upload News</h3>

    <input type="text" id="title" placeholder="News Title">
    <textarea id="description" placeholder="Description"></textarea>
    <input type="file" id="imageInput">

    <button onclick="saveNews()">Publish</button>
    <button onclick="logout()">Logout</button>

    <div id="newsList"></div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let editId = null;

// 🔐 LOGIN
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
  .catch(error => alert(error.message));
}

// 🔐 LOGOUT
function logout(){
  auth.signOut();
}

// 🔐 AUTH STATE
auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");
    loadNews();
  } else {
    document.getElementById("loginSection").classList.remove("hidden");
    document.getElementById("adminPanel").classList.add("hidden");
  }
});

// ➕ SAVE OR UPDATE NEWS
function saveNews(){
  const title = document.getElementById("title").value;
  const description = document.getElementById("description").value;
  const file = document.getElementById("imageInput").files[0];

  if(editId){
    db.collection("news").doc(editId).update({
      title, description
    }).then(() => {
      alert("Updated!");
      editId = null;
    });
  } else {
    const storageRef = storage.ref("news/" + file.name);
    storageRef.put(file).then(snapshot => {
      snapshot.ref.getDownloadURL().then(url => {
        db.collection("news").add({
          title,
          description,
          image: url,
          createdAt: new Date()
        });
      });
    });
  }
}

// 📊 LOAD NEWS
function loadNews(){
  db.collection("news").orderBy("createdAt","desc")
  .onSnapshot(snapshot => {
    const newsList = document.getElementById("newsList");
    newsList.innerHTML = "";
    document.getElementById("totalNews").innerText = snapshot.size;

    snapshot.forEach(doc => {
      const data = doc.data();
      newsList.innerHTML += `
        <div class="card">
          <h4>${data.title}</h4>
          <img src="${data.image}">
          <p>${data.description}</p>
          <button onclick="editNews('${doc.id}','${data.title}','${data.description}')">Edit</button>
          <button onclick="deleteNews('${doc.id}')">Delete</button>
        </div>
      `;
    });
  });
}

// ✏ EDIT
function editNews(id,title,description){
  document.getElementById("title").value = title;
  document.getElementById("description").value = description;
  editId = id;
}

// 🗑 DELETE
function deleteNews(id){
  if(confirm("Delete this news?")){
    db.collection("news").doc(id).delete();
  }
}
</script>

</body>
</html>
